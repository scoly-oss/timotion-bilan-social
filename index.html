<script>

const DATA = {
    "FR": {
      name: `France`,
      flag: `🇫🇷`,
      headcount: `70 salariés`,
      pension: {
        explainer: `Le système de retraite français est l'un des plus complexes mais aussi des plus protecteurs au monde. Pour bien le comprendre, imaginez une grande marmite collective : chaque mois, tous les salariés et tous les employeurs versent de l'argent dans cette marmite, et cet argent est immédiatement redistribué aux retraités actuels. C'est ce qu'on appelle le système par répartition — les actifs d'aujourd'hui paient pour les retraités d'aujourd'hui, avec la promesse que les actifs de demain paieront pour eux quand ils seront à leur tour retraités. C'est très différent de Taiwan, où le système Labor Pension (新制) repose sur des comptes individuels capitalisés.

Le système français repose sur trois « piliers » :

• Le Pilier 1, la retraite de base, est géré par la CNAV (Caisse Nationale d'Assurance Vieillesse). C'est le socle obligatoire, financé par des cotisations prélevées sur le salaire. Tout salarié du secteur privé y cotise. Le calcul de la pension dépend de trois éléments : le salaire annuel moyen des 25 meilleures années de carrière, le taux de liquidation (qui peut atteindre 50 % au maximum si vous avez tous vos trimestres), et la durée d'assurance. En 2025, la pension moyenne de base se situe autour de 750 à 800 €/mois seule, mais elle est complétée par le Pilier 2.

• Le Pilier 2, la retraite complémentaire obligatoire AGIRC-ARRCO, fonctionne par points. Chaque euro cotisé vous rapporte des points, et au moment de la retraite, on multiplie le nombre de points accumulés par la valeur du point. C'est comme un programme de fidélité : plus vous cotisez longtemps et sur un salaire élevé, plus vous accumulez de points, et plus votre pension sera importante. Ce pilier est essentiel : il représente souvent 50 à 60 % de la pension totale d'un cadre.

• Le Pilier 3, l'épargne retraite individuelle, est facultatif. C'est l'équivalent d'un compte épargne personnel que le salarié alimente lui-même, avec des avantages fiscaux. Le produit phare est le PER (Plan d'Épargne Retraite), créé par la loi PACTE de 2019.

Une réforme majeure a été votée en avril 2023 (Loi n° 2023-270 du 14 avril 2023). Son impact principal : l'âge légal de départ à la retraite passe progressivement de 62 à 64 ans pour les personnes nées à partir de 1968, et la durée de cotisation nécessaire pour une pension à taux plein passe à 172 trimestres (43 ans). Cette réforme a été très controversée en France, avec des mois de manifestations, mais elle est désormais en vigueur.

En ordres de grandeur, un salarié français moyen peut espérer une pension totale (base + complémentaire) représentant environ 70 à 75 % de son dernier salaire net s'il a une carrière complète. Pour un cadre ayant gagné 3 500 € brut/mois en fin de carrière, cela peut représenter environ 1 800 à 2 200 € net/mois de pension totale. Le minimum contributif (pension plancher pour une carrière complète au SMIC) est d'environ 850 € de base, auxquels s'ajoutent les complémentaires.

Le financement global est massif : le système de retraite français représente environ 14 % du PIB, l'un des niveaux les plus élevés au monde.`,
        pillars: [
          { name: "Retraite de base (CNAV)", desc: `Le Pilier 1 — la retraite de base du régime général — est géré par la CNAV (Caisse Nationale d'Assurance Vieillesse), elle-même rattachée à la Sécurité sociale. C'est le socle universel : tout salarié du secteur privé y est automatiquement affilié dès son premier jour de travail.

**Qui cotise et combien ?**
Les cotisations sont partagées entre l'employeur et le salarié :
— Cotisation vieillesse plafonnée : 8,55 % à la charge de l'employeur + 6,90 % à la charge du salarié, calculée sur le salaire jusqu'au PASS (Plafond Annuel de la Sécurité Sociale), soit 3 925 €/mois ou 47 100 €/an en 2025. Au-delà de ce plafond, cette cotisation ne s'applique plus.
— Cotisation vieillesse déplafonnée : 2,02 % employeur + 0,40 % salarié, calculée sur la totalité du salaire, sans plafond.

Exemple concret : pour un salarié à 3 500 € brut/mois (sous le PASS), les cotisations retraite de base représentent :
— Part employeur : (8,55 % + 2,02 %) × 3 500 = 369,95 €/mois
— Part salarié : (6,90 % + 0,40 %) × 3 500 = 255,50 €/mois
Soit un total de 625,45 €/mois versés pour la seule retraite de base.

**Comment est calculée la pension ?**
La formule est la suivante :
Pension annuelle = Salaire Annuel Moyen (SAM) × Taux × (Durée d'assurance / Durée de référence)

— Le SAM est la moyenne des 25 meilleures années de salaire, revalorisées de l'inflation. Seuls les salaires dans la limite du PASS sont retenus.
— Le Taux maximum est de 50 % (appelé « taux plein »). On l'obtient soit en ayant le nombre requis de trimestres (172 trimestres pour la génération 1968 et après, soit 43 ans de cotisation), soit en attendant l'âge du taux plein automatique (67 ans). Si on part avant avec des trimestres manquants, une décote de 1,25 % par trimestre manquant est appliquée (dans la limite de 20 trimestres, soit -25 % maximum).
— La Durée de référence est 172 trimestres pour les générations 1968+.

**Exemple chiffré détaillé :**
Un salarié né en 1970, ayant travaillé 43 ans (172 trimestres) avec un salaire annuel moyen de ses 25 meilleures années de 30 000 € (soit 2 500 €/mois en moyenne sur ces années, plafonné au PASS) :
Pension annuelle = 30 000 × 50 % × (172/172) = 15 000 €/an, soit 1 250 €/mois brut.

Un autre salarié avec seulement 160 trimestres (au lieu de 172) aurait une décote : il lui manque 12 trimestres, soit un malus de 12 × 1,25 % = 15 %. Son taux serait de 50 % − 15 % = 42,5 %, et sa pension serait : 30 000 × 42,5 % × (160/172) = 11 860 €/an, soit 988 €/mois — une différence significative.

**Le minimum contributif :** même avec de faibles salaires, un salarié ayant une carrière complète bénéficie du minimum contributif, revalorisé à environ 850 €/mois de pension de base. Depuis la réforme 2023, la pension minimum pour une carrière complète au SMIC a été relevée à environ 85 % du SMIC net.

**L'âge légal :** depuis la réforme du 14 avril 2023, l'âge légal de départ est de 64 ans pour les personnes nées à partir de 1968. Avant cette réforme, c'était 62 ans. La transition est progressive : génération 1961 = 62 ans et 3 mois, génération 1962 = 62 ans et 6 mois, etc.` },
          { name: "Complémentaire AGIRC-ARRCO", desc: `Le Pilier 2 français est la retraite complémentaire obligatoire AGIRC-ARRCO. Depuis 2019, les anciens régimes AGIRC (cadres) et ARRCO (non-cadres) ont fusionné en un régime unique. C'est un système par répartition, comme le Pilier 1, mais qui fonctionne par points — et non par trimestres.

**Comment ça marche ?**
Imaginez un programme de fidélité : chaque mois, une partie de votre salaire est convertie en « points retraite ». Le prix d'achat d'un point s'appelle le « salaire de référence » (fixé à 20,0862 € en 2025). Au moment du départ en retraite, tous les points accumulés sont multipliés par la « valeur de service du point » (1,4386 € en 2025) pour obtenir la pension annuelle.

**Qui cotise et combien ?**
Les cotisations sont calculées sur deux tranches de salaire :
— Tranche 1 (T1) : du 1er euro au PASS (3 925 €/mois). Taux global : 7,87 %, réparti en 4,72 % employeur + 3,15 % salarié. Mais attention, seuls 6,20 % sont réellement convertis en points (le « taux d'acquisition »). La différence finance la gestion du régime.
— Tranche 2 (T2) : du PASS à 8 fois le PASS (de 3 925 € à 31 400 €/mois). Taux global : 21,59 %, réparti en 12,95 % employeur + 8,64 % salarié.

Il existe aussi des cotisations annexes :
— CEG (Contribution d'Équilibre Général) : 2,15 % sur T1 (1,29 % empl + 0,86 % sal), 2,70 % sur T2 (1,62 % empl + 1,08 % sal). Elle sert à équilibrer financièrement le régime.
— CET (Contribution d'Équilibre Technique) : 0,35 % (0,21 % empl + 0,14 % sal), applicable uniquement aux salaires dépassant le PASS. Elle compense le surcoût des hauts salaires.

**Exemple chiffré pour un salarié à 3 500 €/mois brut (inférieur au PASS, donc uniquement T1) :**
— Cotisation AGIRC-ARRCO T1 : 3 500 × 7,87 % = 275,45 €/mois (dont 165,20 € employeur + 110,25 € salarié)
— CEG T1 : 3 500 × 2,15 % = 75,25 €/mois
— Points acquis par mois : (3 500 × 6,20 %) / 20,0862 = 10,80 points/mois, soit environ 129,6 points/an.

Sur une carrière de 42 ans à ce salaire : 129,6 × 42 = 5 443 points.
Pension complémentaire = 5 443 × 1,4386 = 7 832 €/an, soit 653 €/mois brut.

**Pour un cadre à 5 000 €/mois brut :**
— Tranche 1 : 3 925 € → cotisation AGIRC-ARRCO T1 = 3 925 × 7,87 % = 308,90 €
— Tranche 2 : 5 000 − 3 925 = 1 075 € → cotisation T2 = 1 075 × 21,59 % = 232,09 €
— Points T1 : (3 925 × 6,20 %) / 20,0862 = 12,11 pts/mois
— Points T2 : (1 075 × 16,44 %) / 20,0862 = 8,79 pts/mois
— Total : ≈ 20,9 pts/mois, soit 251 points/an.
Sur 42 ans : 10 542 points → pension ≈ 15 166 €/an = 1 264 €/mois brut.

On voit que la complémentaire est absolument essentielle : pour ce cadre, elle représente presque autant que la retraite de base. La pension totale (base + complémentaire) serait d'environ 2 500 €/mois.

**Coefficients de solidarité :** jusqu'en 2023, un malus temporaire de 10 % pendant 3 ans s'appliquait aux retraités partant dès l'âge légal avec tous leurs trimestres. Ce dispositif a été supprimé au 1er avril 2023.` },
          { name: "Épargne retraite (PER)", desc: `Le Pilier 3 est l'épargne retraite individuelle et facultative. C'est un complément que chacun peut constituer librement pour améliorer sa future pension. Pensez-y comme un compte d'épargne dédié à la retraite, avec des avantages fiscaux pour encourager l'épargne.

Le produit principal est le PER (Plan d'Épargne Retraite), créé par la loi PACTE du 22 mai 2019. Il remplace les anciens produits (PERP, Madelin, PERCO, article 83) et se décline en trois volets :

— Le PER Individuel (PERIN) : ouvert à tout le monde, même les indépendants ou les fonctionnaires. Vous y versez ce que vous voulez, quand vous voulez. Les versements sont déductibles de votre revenu imposable, dans la limite de 10 % des revenus professionnels (plafonnés à 8 PASS, soit 37 680 € maximum de déduction en 2025). Pour quelqu'un qui gagne 40 000 €/an, il peut déduire jusqu'à 4 000 € de versements, ce qui réduit ses impôts.

— Le PER Entreprise Collectif (PERECO) : mis en place par l'employeur, il reçoit l'épargne salariale (intéressement, participation, abondement). C'est comme un bonus que l'entreprise peut verser en plus du salaire.

— Le PER Entreprise Obligatoire (PERO) : l'employeur impose des cotisations supplémentaires pour la retraite, souvent pour les cadres ou certaines catégories. Les cotisations de l'employeur au PERO ne sont pas imposables pour le salarié (dans certaines limites).

**L'avantage fiscal est significatif :** un salarié imposé à 30 % qui verse 3 000 €/an sur son PERIN économise 900 € d'impôt. C'est comme si l'État payait 30 % de votre épargne retraite.

**Les conditions de sortie :** le PER est bloqué jusqu'à la retraite, SAUF cas de déblocage anticipé (achat de la résidence principale, décès du conjoint, invalidité, surendettement, fin de droits au chômage, cessation d'activité non salariée suite à liquidation judiciaire). À la retraite, la sortie peut se faire en capital (un versement unique), en rente viagère (un revenu mensuel à vie), ou un mix des deux.

En 2025, environ 10 millions de Français détiennent un PER, avec un encours total de plus de 100 milliards d'euros.` }

        explainer: `Le système de retraite allemand est souvent considéré comme le « modèle bismarckien » — c'est d'ailleurs en Allemagne, en 1889, sous le chancelier Otto von Bismarck, que le premier système de retraite obligatoire au monde a été créé. Aujourd'hui, le système a évolué mais le principe fondateur reste le même : les actifs cotisent pour les retraités actuels (répartition), et les droits acquis dépendent directement des cotisations versées.

Comme en France, le système repose sur trois piliers, mais avec des différences importantes :

• Le Pilier 1 — la Gesetzliche Rentenversicherung (GRV), l'assurance pension légale — est le pilier dominant. Il fonctionne avec un système de « points de rémunération » (Entgeltpunkte). L'idée est brillante par sa simplicité : chaque année, votre salaire est comparé au salaire moyen national. Si vous gagnez exactement la moyenne, vous obtenez 1 point. Si vous gagnez le double, vous obtenez 2 points. Au moment de la retraite, on additionne tous vos points et on les multiplie par la « valeur du point » (Rentenwert), qui est de 40,79 € depuis juillet 2025. C'est comme un compteur qui tourne toute votre carrière.

• Le Pilier 2 — la retraite d'entreprise (Betriebliche Altersversorgung, ou BAV) — est un complément fourni par l'employeur. Depuis 2018, une loi oblige les employeurs à verser un supplément d'au moins 15 % de la cotisation du salarié lorsque celui-ci convertit une partie de son salaire en épargne retraite (Entgeltumwandlung). C'est un mécanisme gagnant-gagnant : le salarié économise des impôts et des cotisations, et l'employeur économise aussi des charges.

• Le Pilier 3 — l'épargne individuelle — inclut notamment la Riester-Rente (subventionnée par l'État) et la Rürup-Rente (pour les indépendants), ainsi que l'épargne privée classique.

Un fait marquant en 2025 : l'unification des systèmes de retraite Est/Ouest est enfin complète. Depuis le 1er janvier 2025, le plafond de cotisation (Beitragsbemessungsgrenze, BBG) est désormais identique dans toute l'Allemagne à 96 600 €/an (8 050 €/mois). Auparavant, les anciens Länder de l'Est avaient un plafond plus bas, un héritage de la réunification de 1990 qui créait des inégalités. La valeur du point de retraite (Rentenwert) est également unifiée. C'est un moment historique : 35 ans après la chute du Mur de Berlin, le système de retraite est enfin unifié.

L'âge légal de départ est de 67 ans pour les personnes nées à partir de 1964 (contre 64 en France). En ordres de grandeur, un salarié allemand avec 45 ans de cotisation au salaire moyen peut espérer une pension légale d'environ 1 835 €/mois brut. Mais attention : contrairement à la France, il n'y a pas de retraite complémentaire obligatoire aussi développée. Le Pilier 1 représente donc la majorité de la pension pour beaucoup d'Allemands, ce qui explique pourquoi le gouvernement encourage fortement les Piliers 2 et 3.

          { name: "Gesetzliche Rentenversicherung", desc: `Le Pilier 1 allemand — la Gesetzliche Rentenversicherung (GRV), gérée par la Deutsche Rentenversicherung (DRV) — est l'assurance pension légale obligatoire. C'est le cœur du système de retraite allemand.

**Qui cotise et combien ?**
Le taux de cotisation est de 18,6 % du salaire brut, partagé strictement à 50/50 : 9,3 % payé par l'employeur et 9,3 % payé par le salarié. Ce taux est fixé par la loi et s'applique sur le salaire jusqu'au plafond de cotisation (Beitragsbemessungsgrenze, BBG).

Depuis le 1er janvier 2025, le BBG est unifié pour toute l'Allemagne (Est et Ouest) à 8 050 €/mois, soit 96 600 €/an. C'est un changement historique : auparavant, le BBG était plus bas dans les anciens Länder de l'Est (environ 7 450 €/mois en 2024), un vestige de la réunification de 1990 où les salaires étaient beaucoup plus bas à l'Est. Cette unification signifie que les travailleurs de l'Est cotisent désormais au même plafond et accumulent des droits identiques.

Exemple : pour un salarié à 4 000 €/mois brut (inférieur au BBG) :
— Part employeur : 9,3 % × 4 000 = 372 €/mois
— Part salarié : 9,3 % × 4 000 = 372 €/mois
— Total retraite légale : 744 €/mois

Pour un salarié à 10 000 €/mois brut (supérieur au BBG) :
— Cotisation plafonnée à 8 050 € : 18,6 % × 8 050 = 1 497,30 €/mois (partagé 50/50)
— Rien n'est cotisé sur la partie au-dessus de 8 050 €.

**Comment est calculée la pension ? Le système de points (Entgeltpunkte)**
C'est un système très logique. Chaque année, votre salaire brut est comparé au salaire moyen national (Durchschnittsentgelt), qui est d'environ 45 358 € en 2025 (soit environ 3 780 €/mois).

— Si vous gagnez exactement le salaire moyen → vous obtenez 1,0 Entgeltpunkt (EP) pour cette année.
— Si vous gagnez 50 % de plus → 1,5 EP.
— Si vous gagnez deux fois le salaire moyen → 2,0 EP.
— Le maximum est plafonné au BBG/salaire moyen ≈ 2,13 EP par an.

Au moment de la retraite, la formule est :
Pension mensuelle = Nombre total d'EP × Zugangsfaktor × Rentenwert

— Le Zugangsfaktor (facteur d'accès) est de 1,0 si vous partez à l'âge légal (67 ans). Chaque mois de départ anticipé coûte 0,3 % de réduction (3,6 % par an). Chaque mois de report rapporte 0,5 % de bonus (6 % par an).
— Le Rentenwert (valeur du point) est de 40,79 € depuis juillet 2025 (unifié Est/Ouest).

**Exemples chiffrés :**

Salarié « standard » (Eckrentner) — 45 ans de cotisation au salaire moyen :
45 EP × 1,0 × 40,79 € = 1 835,55 €/mois brut.
Après cotisations maladie et dépendance (environ 11 %), le net est d'environ 1 634 €/mois.

Salarié à 4 000 €/mois pendant 40 ans :
EP annuel = 4 000 × 12 / 45 358 = 1,058 EP/an.
Total : 1,058 × 40 = 42,33 EP.
Pension = 42,33 × 40,79 = 1 726,95 €/mois brut.

Salarié à 2 000 €/mois pendant 35 ans :
EP annuel = 2 000 × 12 / 45 358 = 0,529 EP/an.
Total : 0,529 × 35 = 18,52 EP.
Pension = 18,52 × 40,79 = 755,43 €/mois brut.
Ce montant est faible, d'où l'importance des Piliers 2 et 3 et du minimum vieillesse (Grundsicherung im Alter).

**L'âge légal :** 67 ans pour toute personne née à partir de 1964 (Regelaltersgrenze). La transition a été progressive depuis 2012 : génération 1958 = 66 ans, génération 1959 = 66 ans et 2 mois, etc. Il existe une exception importante : la « Rente mit 63 » (retraite à 63 ans) pour les personnes ayant 45 ans de cotisation, sans décote — mais l'âge augmente aussi progressivement (à 65 ans pour la génération 1964+).

**Minimum vieillesse (Grundsicherung im Alter) :** les retraités dont les revenus sont inférieurs au minimum vital (environ 930 € pour une personne seule, logement inclus) peuvent demander cette aide, comparable au minimum vieillesse français.` },
          { name: "Betriebliche Altersversorgung (bAV)", desc: `Le Pilier 2 allemand — la Betriebliche Altersversorgung (BAV), ou retraite d'entreprise — est un complément de retraite mis en place par l'employeur. Contrairement à la France où l'AGIRC-ARRCO est obligatoire et universelle, la BAV en Allemagne est encouragée par la loi mais reste largement volontaire dans sa mise en œuvre. Cependant, depuis 2002, chaque salarié a un droit légal à la « conversion de salaire » (Entgeltumwandlung) — c'est-à-dire le droit de transformer une partie de son salaire brut en épargne retraite d'entreprise.

**Le principe de l'Entgeltumwandlung :**
Imaginons qu'un salarié décide de consacrer 200 €/mois de son salaire brut à un plan de retraite d'entreprise. Ces 200 € sont prélevés AVANT le calcul des impôts et des cotisations sociales. Le salarié ne paie donc ni impôt ni cotisations sur cette somme. En contrepartie, il réduit ses droits à la retraite légale (Pilier 1) puisque son salaire « officiel » est réduit de 200 €. C'est un arbitrage entre retraite légale et retraite d'entreprise.

En 2025, le plafond de conversion exonéré de cotisations et d'impôts est de 4 % du BBG, soit 4 % × 96 600 = 3 864 €/an (322 €/mois). Un montant supplémentaire de 1 800 €/an est exonéré d'impôts uniquement (mais pas de cotisations).

**L'obligation de l'employeur depuis 2018 (§1a BetrAVG) :**
Le Betriebsrentenstärkungsgesetz (BRSG, loi de renforcement de la retraite d'entreprise) du 1er janvier 2018 impose aux employeurs de verser un supplément (Arbeitgeberzuschuss) d'au moins 15 % de la cotisation du salarié lorsque celui-ci fait de l'Entgeltumwandlung, à condition que l'employeur réalise effectivement une économie de charges sociales. Depuis 2022, cette obligation s'applique aussi aux contrats existants (pas seulement les nouveaux).

Exemple : si un salarié verse 200 €/mois de son brut vers la BAV, l'employeur DOIT ajouter au minimum 15 % × 200 = 30 €/mois. En pratique, beaucoup d'employeurs versent plus pour attirer les talents.

**Les cinq véhicules de BAV :**
La loi allemande prévoit cinq formes juridiques pour la BAV :
1. Direktversicherung (assurance directe) — le plus courant pour les PME. L'employeur souscrit une assurance-vie au profit du salarié.
2. Pensionskasse (caisse de pension) — similaire, souvent utilisée par les grandes entreprises.
3. Pensionsfonds (fonds de pension) — investissement plus flexible, rendements potentiellement plus élevés.
4. Unterstützungskasse (caisse de soutien) — l'employeur gère directement les fonds.
5. Direktzusage (engagement direct) — promesse de pension inscrite au bilan de l'entreprise.

Pour TiMOTION en Allemagne, la Direktversicherung est probablement la solution la plus simple et la plus courante pour une entreprise de taille moyenne.

**Exemple chiffré complet :**
Salarié à 4 000 € brut/mois qui verse 250 €/mois en BAV :
— Cotisation salarié (Entgeltumwandlung) : 250 €/mois (prélevés sur le brut, avant impôts et cotisations)
— Supplément employeur obligatoire (15 %) : 37,50 €/mois

— Coût réel pour le salarié : 250 − 120 = 130 €/mois de pouvoir d'achat en moins

**Fiscalité à la sortie :** les prestations BAV sont imposables lors du versement (principe de l'imposition différée). Elles sont aussi soumises aux cotisations d'assurance maladie et dépendance (environ 19 % pour un retraité assujetti au KVdR intégral si au-dessus du seuil de franchise, environ 176 €/mois en 2025).` },
          { name: "Riester / Rürup / privé", desc: `Le Pilier 3 allemand — l'épargne retraite individuelle — regroupe plusieurs produits destinés à compenser le taux de remplacement relativement faible du Pilier 1 (environ 48 % du salaire moyen). L'État encourage fortement cette épargne par des subventions directes et des avantages fiscaux.

**La Riester-Rente** (du nom de l'ancien ministre Walter Riester) est le produit le plus connu. Créée en 2002, elle est réservée aux salariés affiliés à la GRV. Le principe : vous versez au minimum 4 % de votre salaire brut de l'année précédente, et l'État ajoute des subventions (Zulagen) :
— Subvention de base : 175 €/an par épargnant.
— Subvention enfant : 300 €/an par enfant né après 2008 (185 € pour les enfants nés avant).

Exemple : un couple avec 2 enfants nés après 2008 reçoit 175 + 175 + 300 + 300 = 950 €/an de subventions de l'État. De plus, les versements (y compris subventions) sont déductibles des impôts jusqu'à 2 100 €/an.

Cependant, la Riester-Rente est en pleine réforme : les frais des contrats ont été très critiqués (souvent 1,5 à 2,5 % par an), et le rendement garanti (0,25 % depuis 2022) est très faible. Le gouvernement allemand prépare une réforme avec un nouveau « Riester-Depot » qui permettrait d'investir en fonds actions (ETF) avec moins de frais. En 2025, cette réforme est en discussion au Bundestag.

**La Rürup-Rente (Basisrente)** est destinée principalement aux travailleurs indépendants et aux professions libérales, qui ne sont pas affiliés à la GRV. Les versements sont déductibles des impôts à 100 % depuis 2023, dans la limite de 27 565 € pour un célibataire (55 130 € pour un couple). C'est un produit qui fonctionne exactement comme une pension : sortie uniquement en rente viagère, pas de retrait en capital.

**L'épargne privée libre :** enfin, tout le monde peut investir librement dans des contrats d'assurance-vie (Lebensversicherung), des fonds d'investissement, ou des ETF (les fameux « Sparpläne » — plans d'épargne en actions) très populaires en Allemagne. Depuis 2023, l'abattement sur les revenus du capital est de 1 000 € par personne (2 000 € pour un couple) — le Sparerpauschbetrag.

        explainer: `Le systeme de retraite italien : comprendre les regles du jeu pour un employeur etranger

Pourquoi est-ce important pour TiMOTION ? Parce que le cout employeur en Italie est substantiel : sur chaque euro de salaire brut, environ 23,81 centimes partent directement vers la caisse de retraite (cotisation patronale IVS). Le salarie, de son cote, contribue a hauteur de 9,19%. Au total, 33% du salaire brut alimente la retraite — un taux parmi les plus eleves d'Europe.

Autre specificite cruciale : le TFR (Trattamento di Fine Rapporto). Pensez-y comme une 'tirelire obligatoire' que l'employeur remplit chaque annee pour le salarie. Chaque annee, l'entreprise met de cote 6,91% du salaire brut annuel. Cette somme est versee au salarie a la fin de son contrat, quelle que soit la raison du depart (demission, licenciement, retraite). Le TFR est a la fois une epargne forcee et une indemnite de depart — un concept unique en Europe.

Comment ca fonctionne concretement ? Depuis la reforme Dini de 1995, l'Italie a bascule vers un systeme 'contributif pur'. Cela signifie que la pension n'est plus calculee sur les derniers salaires (comme c'etait le cas avant), mais sur l'ensemble des cotisations versees tout au long de la carriere. Chaque annee, les cotisations versees sont enregistrees dans un 'montant contributif' (montante contributivo), revalorise chaque annee en fonction de la croissance du PIB nominal italien.

          { name: "Fondi pensione / TFR", desc: `Pilier 2 — Les fonds de pension complementaire et le TFR

        explainer: `Le systeme de retraite espagnol : comprendre les regles du jeu pour un employeur etranger

La premiere chose essentielle a comprendre pour TiMOTION : l'Espagne fonctionne sur un systeme de 14 pagas (14 mensualites), et non 12. C'est une obligation legale inscrite a l'article 31 de l'Estatuto de los Trabajadores. Concretement, chaque salarie recoit son salaire mensuel classique PLUS deux 'pagas extraordinarias' (primes extraordinaires), generalement versees en juin et en decembre. Ces 14 mensualites ne sont pas un bonus — elles font partie integrante du salaire. Quand l'Espagne annonce un SMI (Salario Minimo Interprofesional) de 1 184 euros/mois, cela signifie en realite 1 184 x 14 = 16 576 euros par an. Si vous raisonnez en 12 mois, le salaire minimum 'reel' mensuel est de 1 381 euros.

Le systeme de Securite sociale espagnol (Seguridad Social) est gere par la TGSS (Tesoreria General de la Seguridad Social). Le taux de cotisation pour les 'contingencias comunes' (risques communs — retraite, maladie, maternite) est de 28,30% du salaire brut, reparti entre 23,60% pour l'employeur et 4,70% pour le salarie. C'est la cotisation principale, celle qui finance la retraite.

Le MEI merite une explication particuliere. Face au vieillissement demographique, l'Espagne a cree cette cotisation supplementaire pour alimenter un fonds de reserve. C'est un 'impot generationnel' : les actifs d'aujourd'hui financent la soutenabilite du systeme pour les generations futures. Le taux du MEI est prevu pour augmenter progressivement (0,80% en 2025, jusqu'a 1,20% en 2029).

Calcul de la pension : la pension est determinee par la 'base reguladora', qui est la moyenne des bases de cotisation des 25 dernieres annees, actualisees selon l'inflation (sauf les 24 derniers mois, pris en valeur nominale).

- MEI salarie : 2 571 x 0,13% = 3,34 euros/mois

Le pourcentage de la base reguladora effectivement verse en pension depend de la duree de cotisation :
- 15 ans minimum : 50% de la base reguladora
- Chaque annee supplementaire entre 16 et 37 ans : ajout progressif
- 37 ans et 3 mois : 100% de la base reguladora

La pension maximale en 2025 est plafonnee a environ 3 267 euros/mois (14 pagas). La pension minimale depend de la situation familiale.` },
          { name: "Planes de pensiones empresa", desc: `Pilier 2 — Les plans de pension d'entreprise (Planes de Pensiones de Empleo)

Contrairement a l'Italie ou a la Belgique, le pilier 2 est historiquement tres peu developpe en Espagne. Le pays est en train de le renforcer grace a la Ley 12/2022 qui a cree les nouveaux 'planes de pensiones de empleo de promocion publica'.

Avant cette reforme, seules les grandes entreprises (banques, multinationales) proposaient des plans de pension d'entreprise. Pour les PME, c'etait quasi inexistant. La nouvelle loi vise a democratiser le pilier 2 en permettant aux conventions collectives sectorielles d'imposer des plans de pension obligatoires.

Fonctionnement des plans de pension d'entreprise :
- L'employeur contribue un pourcentage du salaire (fixe par la convention collective ou l'accord d'entreprise)
- Le salarie peut aussi contribuer volontairement
- Les contributions sont fiscalement avantageuses : deductibles pour l'entreprise, avec un plafond de 8 500 euros/an pour les contributions patronales (contre seulement 1 500 euros/an pour les contributions individuelles du salarie)
- Les droits sont portables : le salarie emporte son 'pot' s'il change d'employeur
- La sortie se fait exclusivement sous forme de rente ou capital a la retraite (sauf cas exceptionnels : chomage longue duree, maladie grave, invalidite)

L'etat actuel : la reforme est encore recente et la plupart des PME espagnoles n'ont pas encore de plan de pension d'entreprise. Pour TiMOTION, il n'y a pas d'obligation legale de mettre en place un plan d'entreprise, SAUF si la convention collective applicable le prevoit. Il faut verifier le 'convenio colectivo' (convention collective) applicable.

Toutefois, la tendance est claire : l'Espagne encourage fortement le developpement du pilier 2 par des avantages fiscaux cibles. C'est un outil de fidelisation interessant pour attirer des talents dans un marche du travail de plus en plus competitif.

      pension: {
        explainer: `Imaginez un système de retraite construit comme une maison à trois étages, mais où chaque étage fonctionne selon une logique complètement différente de ce que vous connaissez peut-être en Asie.

**Le principe fondamental à comprendre** : au Royaume-Uni, la retraite d'État ne dépend PAS de votre salaire. Que vous gagniez £20 000 ou £200 000 par an, vous recevrez exactement le même montant si vous avez cotisé le nombre d'années requis. C'est un système « forfaitaire » — pensez-y comme un ticket d'entrée : soit vous l'avez tamponné suffisamment de fois (35 années de cotisations National Insurance), soit vous ne l'avez pas. Ce montant forfaitaire est actuellement de £230,25 par semaine (environ £11 973 par an) pour 2025/26, et passera à £241,30 par semaine (environ £12 548 par an) en 2026/27.

**Pourquoi ce choix forfaitaire ?** Parce que le Royaume-Uni a fait un pari historique : l'État fournit un « socle de survie » identique pour tous, et c'est au salarié et à l'employeur de construire le reste via l'épargne privée. C'est l'opposé exact de pays comme la France ou Taïwan où la pension d'État est proportionnelle aux revenus de carrière.

**Le « Triple Lock » — un mécanisme unique au monde.** Ce montant forfaitaire est revalorisé chaque année selon la plus élevée de trois valeurs : l'inflation (CPI), la croissance des salaires moyens, ou 2,5 %. C'est comme si le gouvernement avait installé trois filets de sécurité superposés pour garantir que la pension ne perde jamais de valeur réelle. Ce mécanisme est politiquement explosif car il coûte de plus en plus cher au Trésor public, mais aucun parti n'ose le supprimer de peur de perdre le vote des retraités.

**L'auto-enrolment — la « pension forcée ».** Depuis le Pensions Act 2008 (mis en œuvre progressivement à partir de 2012), chaque employeur britannique est OBLIGÉ d'inscrire automatiquement ses salariés dans un plan de pension professionnelle. Le salarié peut en sortir (« opt out »), mais l'inertie comportementale fait que plus de 85 % des salariés restent inscrits. C'est un coup de génie de l'économie comportementale : plutôt que d'obliger les gens à épargner, on les inscrit par défaut et on leur laisse le choix de partir. Le résultat est spectaculaire : des millions de Britanniques qui n'épargnaient rien pour leur retraite le font désormais.

**Pour un employeur taïwanais comme TiMOTION**, les implications sont très concrètes. Au-delà du salaire brut, vous devez prévoir : les cotisations National Insurance employeur (15 % au-delà de £5 000 depuis avril 2025 — une hausse significative par rapport aux 13,8 % au-delà de £9 100 qui prévalaient avant), et une contribution pension obligatoire d'au moins 3 % des « qualifying earnings » (la tranche de salaire entre £6 240 et £50 270 par an).

**Le système fiscal** ajoute une couche de complexité. L'impôt sur le revenu fonctionne par tranches (20 %, 40 %, 45 %), avec un abattement personnel de £12 570 qui disparaît progressivement entre £100 000 et £125 140 de revenus — créant un taux marginal effectif de 60 % dans cette zone, un piège que peu de dirigeants étrangers anticipent.

**Les sanctions sont sévères.** Un employeur qui ne respecte pas l'auto-enrolment s'expose à une amende fixe de £400, puis des pénalités journalières de £50 à £10 000 selon la taille de l'entreprise, et dans les cas extrêmes, jusqu'à 2 ans de prison. Le Royaume-Uni prend très au sérieux la protection de l'épargne retraite de ses travailleurs.

        pillars: [
          { name: "State Pension", desc: `**Pilier 1 — La State Pension (Pension d'État)**

La State Pension britannique est régie par le Pensions Act 2014 et fonctionne sur un principe radicalement simple : un montant unique, identique pour tous, conditionné à un nombre suffisant d'années de cotisations au National Insurance (NI).

**Montants en vigueur :**
- 2025/26 : £230,25 par semaine = £11 973 par an
- 2026/27 : £241,30 par semaine = £12 548 par an (revalorisation Triple Lock)

**Conditions d'éligibilité :**
- Âge de départ : 66 ans actuellement, passage progressif à 67 ans d'ici 2028, puis 68 ans envisagé ultérieurement.
- Minimum 10 années de cotisations NI pour ouvrir un droit.
- 35 années complètes pour obtenir le montant intégral.
- Entre 10 et 35 ans : montant proportionnel. Par exemple, avec 20 années validées, vous recevez 20/35 × £230,25 = £131,57 par semaine.

**Exemple chiffré concret :** Un ingénieur TiMOTION qui travaille au Royaume-Uni pendant 8 ans ne remplit pas la condition minimale de 10 ans. Il ne touchera RIEN de la State Pension britannique, sauf si des accords bilatéraux de totalisation permettent de combiner ses années au Royaume-Uni avec des années cotisées dans un autre pays (il existe des conventions avec de nombreux pays, mais pas directement avec Taïwan — vérification nécessaire au cas par cas).

En revanche, s'il travaille 12 ans au Royaume-Uni, il recevra : 12/35 × £230,25 = £78,94 par semaine = £4 105 par an. C'est modeste, mais c'est un revenu garanti à vie, revalorisé chaque année.

**Le Triple Lock expliqué par l'exemple :**
Supposons qu'en 2027 l'inflation soit de 3 %, la croissance des salaires de 4,5 % et le plancher soit de 2,5 %. La pension sera revalorisée de 4,5 % (la plus haute des trois valeurs). C'est pour cela que la State Pension a augmenté de 4,1 % pour 2025/26 et augmentera encore pour 2026/27. Ce mécanisme est extrêmement protecteur pour les retraités, mais il représente un coût budgétaire croissant pour le gouvernement.

**Financement :** La State Pension est financée par le National Insurance — ce n'est PAS un système par capitalisation. Les cotisations des actifs d'aujourd'hui paient les pensions des retraités d'aujourd'hui (système par répartition). L'employé paie 8 % sur la tranche £12 570–£50 270, puis 2 % au-delà. L'employeur paie 15 % sur tout ce qui dépasse £5 000 par an. Ces cotisations financent aussi d'autres prestations (maladie, chômage), pas uniquement la retraite.

**Point clé pour TiMOTION :** La State Pension seule est insuffisante pour vivre décemment au Royaume-Uni. £12 000 par an dans un pays où le loyer moyen dépasse £800/mois à lui seul ne permet pas de maintenir un niveau de vie correct. C'est pourquoi le pilier 2 (auto-enrolment) est devenu fondamental.

          { name: "Auto-enrolment (Workplace Pension)", desc: `**Pilier 2 — L'Auto-Enrolment (Pension Professionnelle Obligatoire)**

L'auto-enrolment, instauré par le Pensions Act 2008, est la pièce maîtresse du système retraite britannique pour les salariés du secteur privé. Pensez-y comme une « épargne forcée dans un pot d'investissement » : chaque mois, de l'argent est prélevé sur votre salaire et celui de votre employeur, puis placé dans un fonds d'investissement qui fait fructifier cette épargne sur le marché financier.

**Les taux de cotisation obligatoires :**
- Employeur : minimum 3 % des « qualifying earnings »
- Salarié : minimum 5 % (dont 1 % provient en réalité de l'allégement fiscal — le « tax relief »)
- Total minimum : 8 %

**Les « qualifying earnings » :** seule la tranche de salaire comprise entre £6 240 et £50 270 par an est soumise à ces cotisations. Autrement dit, les premiers £6 240 et tout ce qui dépasse £50 270 ne sont pas concernés par le minimum légal (bien que l'employeur puisse aller au-delà volontairement).

**Exemple chiffré :** Un salarié TiMOTION UK gagnant £35 000 brut par an.
- Qualifying earnings : £35 000 − £6 240 = £28 760
- Cotisation employeur (3 %) : £28 760 × 3 % = £862,80 par an
- Cotisation salarié (4 % net, 5 % avec tax relief) : £28 760 × 4 % = £1 150,40 déduits du net + £287,60 de tax relief du HMRC = £1 438 total
- Total versé dans le « pot » : £862,80 + £1 438 = £2 300,80 par an

Après 30 ans avec un rendement moyen de 5 % par an (hypothèse modérée), ce salarié pourrait accumuler environ £160 000 dans son pot de pension. Converti en rente viagère (annuity), cela pourrait générer environ £8 000–£10 000 par an, qui s'ajoutent à la State Pension.

**Le mécanisme du « tax relief » est un véritable cadeau fiscal.** Quand le salarié verse £80 dans sa pension, le gouvernement ajoute automatiquement £20 (remboursement de l'impôt à 20 %). Pour un contribuable à 40 %, l'avantage est encore plus grand : il récupère £20 supplémentaires via sa déclaration d'impôt. Concrètement, £100 dans la pension ne coûte que £60 au contribuable à 40 %.

**Obligations de l'employeur TiMOTION UK :**
1. Choisir un fonds de pension agréé (NEST est le fonds public par défaut, simple à utiliser).
2. Inscrire automatiquement tout salarié éligible (22 ans+, gagnant plus de £10 000/an).
3. Verser les cotisations chaque mois au fonds de pension.
4. Réinscrire automatiquement tous les 3 ans les salariés qui ont fait opt-out.

**Sanctions en cas de non-conformité :** Le régulateur TPR (The Pensions Regulator) est intransigeant. Amende fixe de £400, puis pénalités journalières escaladantes (£50/jour pour les micro-entreprises, jusqu'à £10 000/jour pour les grandes), et dans les cas de fraude délibérée, poursuites pénales pouvant aller jusqu'à 2 ans d'emprisonnement.

Pour un employeur taïwanais comme TiMOTION, le salaire brut affiché sur le contrat de travail n'est que la partie visible de l'iceberg. Le coût réel pour l'entreprise comprend plusieurs couches supplémentaires qu'il est impératif de budgétiser.

**Couche 4 — Les autres coûts obligatoires**

      pension: {
        explainer: `Les Pays-Bas possèdent le système de retraite classé numéro 1 mondial par le Mercer Global Pension Index depuis de nombreuses années. Pour comprendre pourquoi, il faut imaginer une architecture à trois piliers où chacun fonctionne remarquablement bien — ce qui est rare à l'échelle internationale.

**Le premier pilier (AOW) est universel et basé sur la RÉSIDENCE, pas sur le travail.** C'est une différence fondamentale avec la quasi-totalité des autres pays. Toute personne ayant résidé aux Pays-Bas entre 15 et 67 ans accumule des droits à raison de 2 % par année de résidence. Après 50 ans de résidence, vous avez droit à 100 % de l'AOW, soit environ 1 580,92 € par mois pour un célibataire (2025), plus un « vakantiegeld » (allocation vacances) de 106,55 € par mois. Vous n'avez même pas besoin d'avoir travaillé un seul jour. Un artiste qui a vécu toute sa vie aux Pays-Bas sans jamais cotiser reçoit exactement le même montant qu'un directeur de multinationale.

**Le deuxième pilier est ce qui rend le système néerlandais exceptionnel.** Les pensions professionnelles sont quasi universelles (plus de 90 % des salariés sont couverts) et les montants accumulés sont colossaux : plus de 1 500 milliards d'euros d'actifs gérés par les fonds de pension néerlandais, soit environ 170 % du PIB. C'est comme si chaque Néerlandais avait un compte d'épargne retraite géant alimenté par des cotisations très élevées (20 à 30 % du salaire pensionnable). Ces fonds sont parmi les plus gros investisseurs institutionnels du monde.

**Le troisième pilier** complète avec de l'épargne individuelle fiscalement avantageuse, mais il est moins crucial qu'ailleurs car les deux premiers piliers sont déjà très robustes.

**Pour un employeur taïwanais, les Pays-Bas présentent un paradoxe :** le coût du travail est élevé (parmi les plus élevés d'Europe), mais la qualité de la protection sociale est telle qu'elle contribue à la stabilité et à la productivité de la main-d'œuvre. Les salariés néerlandais sont parmi les plus productifs au monde par heure travaillée.

**Le vakantiegeld — le « 13ème mois version néerlandaise ».** Chaque employeur néerlandais est OBLIGÉ par la loi de verser un « pécule de vacances » égal à 8 % du salaire brut annuel. Ce montant est généralement versé en une seule fois au mois de mai. Concrètement, si un salarié gagne 3 500 € brut par mois, il recevra 3 500 × 12 × 8 % = 3 360 € brut supplémentaires en mai. C'est un véritable 13ème mois, et il faut impérativement le budgétiser dans le coût salarial annuel.

**Le grand chantier en cours : la WTP (Wet Toekomst Pensioenen).** Cette loi de transition des pensions, qui doit être finalisée avant le 1er janvier 2028, va transformer tous les régimes professionnels en régimes à cotisations définies (DC). C'est un séisme pour les fonds de pension néerlandais. Pour TiMOTION, cela signifie que les règles du pilier 2 vont changer significativement dans les deux prochaines années.

        pillars: [
          { name: "AOW (Pension d'État)", desc: `**Pilier 1 — L'AOW (Algemene Ouderdomswet — Loi Générale sur les Pensions de Vieillesse)**

L'AOW est le socle universel du système de retraite néerlandais, en vigueur depuis 1957. Son fonctionnement est unique en Europe car il est basé sur la résidence et non sur l'emploi.

**Principe de calcul — 2 % par année de résidence :**
Chaque année vécue aux Pays-Bas entre l'âge de 15 ans et l'âge légal de la retraite (actuellement 67 ans) donne droit à 2 % de la pension complète. Après 50 années de résidence, vous obtenez 100 %.

**Montants 2025 (célibataire) :**
- Pension mensuelle brute : 1 580,92 €
- Vakantiegeld AOW mensuel : 106,55 €
- Total mensuel : 1 687,47 €
- Total annuel : 20 249,64 €

**Exemples chiffrés pour les expatriés TiMOTION :**

**Particularité cruciale — les « lacunes AOW » :** Chaque année passée HORS des Pays-Bas entre 15 et 67 ans crée une « lacune » (AOW-gat) de 2 %. Un salarié taïwanais qui arrive aux Pays-Bas à 35 ans a déjà 20 années de lacune (de 15 à 35 ans), soit 40 % de pension en moins. Il est possible de racheter ces lacunes (vrijwillige AOW-verzekering), mais c'est coûteux et soumis à des conditions strictes de délai (en général dans les 10 ans suivant le départ des Pays-Bas).

          { name: "Pension professionnelle (ABP, PME, etc.)", desc: `**Pilier 2 — La Pension Professionnelle (Aanvullend Pensioen)**

C'est ici que réside la véritable puissance du système néerlandais. Les pensions professionnelles couvrent plus de 90 % des salariés et représentent des montants considérables.

**Comment ça fonctionne :**
Dans la plupart des secteurs, un fonds de pension sectoriel (Bedrijfstakpensioenfonds ou Bpf) est désigné comme gestionnaire obligatoire. L'employeur n'a PAS le choix : si son secteur d'activité est couvert par un Bpf, il DOIT y affilier ses salariés et y verser les cotisations prévues. C'est une obligation quasi automatique.

**Le « salaire pensionnable » et la franchise AOW :**
Les cotisations ne portent pas sur le salaire brut total, mais sur le « salaire pensionnable » = salaire brut annuel − franchise AOW. La franchise AOW (environ 17 545 € en 2025) représente la part du revenu déjà « couverte » par le pilier 1. C'est logique : on ne fait pas cotiser pour le pilier 2 sur la partie du revenu déjà protégée par l'AOW.

**Exemple chiffré :** Un salarié TiMOTION NL gagnant 50 000 € brut par an.
- Franchise AOW : 17 545 €
- Salaire pensionnable : 50 000 − 17 545 = 32 455 €

- Part employeur (hypothèse 2/3) : 5 409 €/an
- Part salarié (hypothèse 1/3) : 2 705 €/an

C'est plus de 5 400 € par an de coût supplémentaire pour l'employeur, en plus de toutes les autres charges. Ce montant est directement versé au fonds de pension et constitue une épargne individuelle pour le salarié.

**La transition WTP — un séisme en cours :**
La Wet Toekomst Pensioenen (Loi sur l'Avenir des Pensions) impose à TOUS les fonds de pension néerlandais de passer d'un système à prestations définies (DB — le fonds promet un montant de pension) à un système à cotisations définies (DC — le fonds promet uniquement de verser les cotisations, le montant final dépend des marchés). Cette transition doit être achevée avant le 1er janvier 2028.

**Implications pour TiMOTION :** Les règles de cotisation, les droits acquis et les modalités de calcul vont évoluer. Il est essentiel de suivre les communications du fonds de pension sectoriel applicable et de se faire accompagner par un conseiller en pensions néerlandais pour cette transition.

**Sanctions Bpf (fonds sectoriel obligatoire) :** Si un employeur omet de s'affilier au Bpf obligatoire de son secteur, le fonds peut exiger l'affiliation RÉTROACTIVE, avec paiement de toutes les cotisations non versées depuis le début de l'activité, majorées d'intérêts. Ces montants peuvent être dévastateurs pour une entreprise qui a opéré pendant des années sans s'affilier.

Les Pays-Bas sont l'un des pays les plus coûteux d'Europe en matière de charges sociales employeur. Pour TiMOTION, il est crucial de comprendre que le salaire brut mensuel affiché ne représente qu'une fraction du coût réel.

**Le vakantiegeld (pécule de vacances) — 8 % obligatoire.** C'est la première surprise pour les employeurs étrangers. La loi néerlandaise (Wet minimumloon en minimumvakantiebijslag) impose le versement d'un pécule de vacances égal à 8 % du salaire brut annuel. Pensez-y comme un « 13ème mois version néerlandaise », sauf qu'il est obligatoire et non négociable. Il est généralement versé en mai de chaque année. Pour un salaire brut mensuel de 4 000 €, cela représente 4 000 × 12 × 8 % = 3 840 € supplémentaires par an, soit 320 €/mois en provisionnement.

        explainer: `Le système de retraite polonais : trois étages pour une pension complète

Pour comprendre la retraite en Pologne, imaginez un immeuble de trois étages. Le rez-de-chaussée est solide et obligatoire — c'est le régime public géré par la ZUS (l'équivalent polonais de la Sécurité sociale). Le premier étage est un appartement que l'employeur meuble pour vous — c'est le PPK, le plan d'épargne-retraite d'entreprise. Le deuxième étage, enfin, est un grenier aménagé à vos frais — c'est l'épargne individuelle complémentaire (IKE/IKZE).

L'histoire récente est cruciale pour comprendre le système actuel. En 2012, le gouvernement polonais avait voté une réforme ambitieuse alignant l'âge de départ à 67 ans pour tous, hommes et femmes. Mais en 2017, le parti Droit et Justice (PiS) a fait marche arrière : l'âge légal est redescendu à 65 ans pour les hommes et 60 ans pour les femmes. Ce renversement, très populaire électoralement, a créé un défi financier majeur : les femmes polonaises partent en moyenne cinq ans plus tôt que les hommes, ce qui réduit mécaniquement le montant de leur pension (moins d'années de cotisation, plus d'années de versement). Une ingénieure de 60 ans qui part à la retraite touchera structurellement moins qu'un ingénieur de 65 ans ayant cotisé cinq ans de plus.

C'est précisément pour compenser cette faiblesse du premier pilier que la Pologne a introduit en 2019 le PPK (Pracownicze Plany Kapitałowe), un dispositif d'épargne-retraite d'entreprise quasi-obligatoire. Le mécanisme est astucieux : l'employeur est OBLIGÉ de mettre en place un PPK et d'y verser au minimum 1,5 % du salaire brut. Le salarié, de son côté, verse 2 % par défaut — mais il peut demander à ne pas y participer (opt-out). S'il reste, l'État lui offre un bonus de bienvenue de 250 PLN et un complément annuel de 240 PLN. C'est une « obligation d'épargne forcée avec aide d'État » : l'employeur ne peut pas y échapper, le salarié peut en sortir mais perd alors les aides publiques. En pratique, environ 40 % des salariés polonais ont fait le choix de rester dans le PPK.

- Cotisation retraite salarié : 8 000 × 9,76 % = 780,80 PLN

- Cotisation invalidité salarié : 8 000 × 1,50 % = 120 PLN

- Total retraite + invalidité : 2 201,60 PLN/mois, soit 27,52 % du brut

Le système fonctionne selon un mécanisme de comptes notionnels : chaque zloty cotisé est inscrit sur un compte virtuel individuel, revalorisé chaque année en fonction de la croissance du PIB nominal et de la masse salariale. Au moment du départ, le capital notionnel accumulé est divisé par l'espérance de vie résiduelle statistique pour déterminer le montant mensuel de la pension.

          { name: "PPK — Plan d'entreprise", desc: `Pilier 2 — Le PPK (Pracownicze Plany Kapitałowe) : l'épargne-retraite d'entreprise

      pension: {
        explainer: `Le système danois : la flexicurité et l'État-providence au service de la retraite

Le Danemark est un cas unique en Europe, et pour une direction taiwanaise habituée à des structures rigides, il peut sembler paradoxal. Imaginez un pays où il n'existe PAS de salaire minimum légal, où l'employeur peut licencier un salarié avec un préavis très court, mais où ce même salarié bénéficie d'allocations chômage pouvant atteindre 90 % de son ancien salaire pendant deux ans. C'est le modèle de la « flexicurité » (flexicurity) : une flexibilité extrême du marché du travail compensée par un filet de protection sociale extrêmement dense, financé par des impôts parmi les plus élevés au monde (37 à 52 % du revenu).

Pour la retraite, ce modèle se traduit par un système à trois piliers particulièrement généreux :

Le premier pilier est la Folkepension, une pension universelle financée par l'impôt — pas par des cotisations spécifiques. Tout résident ayant vécu au moins 40 ans au Danemark y a droit, quel que soit son parcours professionnel. C'est un filet de sécurité absolu : même quelqu'un qui n'a jamais travaillé peut toucher une pension de base. L'âge de départ est actuellement de 67 ans, mais une réforme le portera progressivement à 70 ans d'ici 2040, indexé automatiquement sur l'espérance de vie. Le Danemark est l'un des rares pays à avoir intégré ce mécanisme d'ajustement automatique, ce qui rend le système financièrement soutenable à long terme.

Le deuxième pilier est la pension professionnelle, négociée dans les conventions collectives. Depuis mai 2025, le taux standard est de 13 % du salaire brut, réparti entre 11 % à la charge de l'employeur et 2 % à la charge du salarié. Ces pensions sont gérées par des fonds de pension privés (PFA, Danica, Sampension, etc.) et constituent souvent la part la plus importante de la pension totale d'un retraité danois.

Pourquoi pas de SMIC au Danemark ? Parce que le modèle repose entièrement sur la négociation collective. Environ 80 % des salariés danois sont couverts par une convention collective qui fixe des salaires minimums sectoriels bien plus élevés que ce qu'un SMIC légal imposerait. Par exemple, un ouvrier industriel couvert par une convention gagne typiquement 130 à 150 DKK de l'heure (environ 17 à 20 €), soit nettement plus que le SMIC français. Le système fonctionne parce que le taux de syndicalisation reste très élevé (environ 67 %) et que les organisations patronales acceptent ce cadre de négociation.

Pour TiMOTION, les implications pratiques sont importantes : les coûts salariaux danois sont élevés (un salarié industriel coûte facilement 40 000 à 50 000 DKK/mois charges comprises), mais la productivité est parmi les plus élevées d'Europe, le turnover est facilement gérable grâce à la flexibilité du licenciement, et la gestion administrative est relativement simple une fois le cadre conventionnel maîtrisé.`,

          { name: "Folkepension + ATP", desc: `Pilier 1 — Folkepension et ATP : le socle universel

Le premier pilier danois combine deux mécanismes distincts :

1) La Folkepension (pension du peuple)
C'est une pension universelle, financée par l'impôt général, sans lien avec les cotisations versées. En 2025, elle se compose de :
- Un montant de base (grundbeløb) : environ 6 600 DKK/mois pour une personne seule
- Un complément sous conditions de ressources (pensionstillæg) : jusqu'à environ 7 600 DKK/mois
- Total maximum : environ 14 200 DKK/mois (~1 900 €) pour une personne seule sans autres revenus

Le droit à la Folkepension complète s'acquiert après 40 années de résidence au Danemark entre 15 et 67 ans. Pour chaque année manquante, la pension est réduite de 1/40e. Un expatrié de TiMOTION qui travaillerait 10 ans au Danemark n'aurait droit qu'à 10/40e = 25 % de la Folkepension complète.

L'âge de départ est actuellement de 67 ans, mais il est indexé sur l'espérance de vie avec un décalage de 15 ans. La projection actuelle prévoit un passage à 68 ans en 2030, 69 ans en 2035 et 70 ans en 2040. Le Danemark est le seul pays au monde à avoir un mécanisme aussi automatique et transparent.

2) L'ATP (Arbejdsmarkedets Tillægspension)
C'est un régime complémentaire obligatoire par capitalisation. La cotisation est FIXE (non proportionnelle au salaire) : 297 DKK/mois au total, répartis entre 198 DKK pour l'employeur et 99 DKK pour le salarié.

          { name: "Pension professionnelle (convention)", desc: `Pilier 2 — La pension professionnelle (Arbejdsmarkedspension) : le cœur du système

          { name: "Ratepension / Aldersopsparing", desc: `Pilier 3 — L'épargne-retraite individuelle (Aldersopsparing)

- Ratepension (pension par versements échelonnés) : les versements sont déductibles du revenu imposable (dans la limite de 63 100 DKK/an), mais les retraits sont imposés comme un revenu ordinaire.

        explainer: `Le systeme de retraite belge : comprendre les regles du jeu pour un employeur etranger

Le systeme belge est souvent considere comme l'un des plus complexes et des plus couteux d'Europe pour les employeurs. Imaginez un millefeuille a trois etages : le premier etage (la pension legale) est relativement modeste, le deuxieme etage (l'assurance groupe) est quasi-indispensable pour completer, et le troisieme etage (l'epargne individuelle) permet aux salaries d'ajouter une cerise sur le gateau.

Pour TiMOTION, le premier fait marquant est le cout global du travail en Belgique. Les cotisations sociales patronales sont parmi les plus elevees au monde : environ 25% du salaire brut rien qu'en cotisations ONSS (Office National de Securite Sociale) patronales. Le salarie, de son cote, voit 13,07% de son brut preleve pour les cotisations sociales. Au total, pres de 38% du salaire brut est absorbe par les cotisations avant meme de parler d'impot sur le revenu.

Deuxieme particularite majeure : l'indexation automatique des salaires. La Belgique est l'un des tres rares pays europeens ou les salaires sont automatiquement ajustes a l'inflation. Quand l'indice-pivot (un seuil calcule a partir de l'indice sante des prix) est depasse, TOUS les salaires sont automatiquement augmentes de 2%. Pour TiMOTION, cela signifie que la masse salariale augmente mecaniquement, sans aucune negociation — c'est a la fois une protection pour les salaries et une contrainte budgetaire pour l'employeur.

Troisieme element crucial : le 'double pecule de vacances'. En Belgique, chaque salarie recoit un supplement de salaire au moment de ses conges principaux (generalement en mai ou juin). Pour les employes, ce double pecule represente environ 92% du salaire brut mensuel. C'est un cout cache considerable que beaucoup d'employeurs etrangers decouvrent avec surprise. Pour un salarie gagnant 4 000 euros brut/mois, le double pecule represente environ 3 680 euros supplementaires par an.

Le RMMMG (Revenu Minimum Mensuel Moyen Garanti) joue le role de salaire minimum en Belgique. Il est fixe a 2 111,89 euros brut/mois depuis fevrier 2025, apres indexation. C'est l'un des plus eleves d'Europe.

L'age legal de la retraite est passe a 66 ans au 1er janvier 2025 (contre 65 ans avant). Il passera a 67 ans en 2030. La pension minimale pour une carriere complete est de 1 773,35 euros/mois — relativement faible au regard du cout de la vie belge, ce qui explique l'importance capitale du pilier 2.

Pour TiMOTION, le cout employeur total en Belgique est generalement de 40% a 50% au-dessus du salaire brut affiche, en integrant cotisations ONSS, double pecule de vacances, et assurance groupe.`,

          { name: "Pension légale (ONP)", desc: `Pilier 1 — La pension legale : le socle public

Le premier pilier belge est le systeme de pension legale, gere par le Service federal des Pensions (SFP). Il est finance par les cotisations ONSS (Office National de Securite Sociale) et fonctionne sur le principe de la repartition.

Les cotisations ONSS englobent TOUTES les branches de la securite sociale (pas seulement la retraite) :
- Part patronale : environ 25% du salaire brut (taux global, incluant retraite, maladie, chomage, etc.)
- Part salariale : 13,07% du salaire brut

Il n'existe pas en Belgique de cotisation 'retraite' isolee comme en France ou en Italie. L'ONSS collecte une cotisation globale qui finance l'ensemble du systeme de protection sociale, et la repartition entre les differentes branches est faite en aval par la 'gestion globale'.

Calcul de la pension : la pension legale belge est calculee selon une formule relativement simple :
Pension annuelle = (Salaire revalorise x Nombre d'annees de carriere x 60%) / 45

- Le salaire revalorise est la moyenne des salaires de carriere, indexes et plafonnes
- Le plafond salarial pris en compte est d'environ 73 286 euros brut/an (2025)
- 45 est le nombre d'annees pour une 'carriere complete'
- 60% pour un isole, 75% pour un menage (si le conjoint n'a pas de pension propre)

Exemple pour un salarie TiMOTION gagnant 50 000 euros brut/an pendant 40 ans :
- Salaire pris en compte (plafonne et revalorise) : estimons 48 000 euros/an en moyenne
- Pension annuelle = (48 000 x 40 x 60%) / 45 = 25 600 euros/an
- Pension mensuelle = 2 133 euros/mois

Cela peut sembler correct, mais attention : ce montant est BRUT. Apres cotisations AMI (3,55%) et prelevement de solidarite (0% a 2%), la pension nette sera inferieure.

          { name: "LPC / Assurance groupe", desc: `Pilier 2 — L'assurance groupe : pas obligatoire, mais quasi-universelle

Le deuxieme pilier belge est constitue des 'assurances groupe' (plans de pension d'entreprise) et des fonds de pension sectoriels. Sur le papier, aucune loi n'impose a l'employeur de souscrire une assurance groupe. En pratique, plus de 75% des salaries belges en beneficient, et ne pas en proposer place l'employeur dans une position de desavantage competitif majeur.

Pourquoi est-ce quasi-obligatoire malgre l'absence de loi ? Trois raisons :

1. Pression conventionnelle : de nombreuses commissions paritaires (equivalents des conventions collectives) imposent un plan de pension sectoriel. Si votre secteur en prevoit un, c'est obligatoire.
2. Attentes du marche : en Belgique, l'assurance groupe fait partie du 'package salarial standard'. Ne pas en proposer rend le recrutement tres difficile.
3. Faiblesse de la pension legale : avec un taux de remplacement de 47%, les salaries comptent sur le pilier 2 pour maintenir leur niveau de vie a la retraite.

Fonctionnement de l'assurance groupe :
- L'employeur contribue un pourcentage du salaire (generalement entre 1% et 5% du salaire annuel brut)
- Le salarie peut aussi contribuer (typiquement 0,5% a 2%)
- Un rendement minimum est garanti par la loi (Loi sur les Pensions Complementaires - LPC) : 1,75% par an sur les contributions patronales et salariales
- Le capital constitue est verse a la retraite, sous forme de capital ou de rente

La garantie de rendement de 1,75% est cruciale a comprendre : c'est l'EMPLOYEUR qui garantit ce rendement minimum. Si l'assureur delivre un rendement inferieur (ce qui arrive regulierement dans un environnement de taux bas), c'est l'entreprise qui doit combler la difference. C'est un engagement financier implicite que TiMOTION doit anticiper.

Cout pour TiMOTION : pour une contribution patronale de 3% du salaire brut :

          { name: "Épargne-pension individuelle", desc: `Pilier 3 — L'epargne-pension individuelle et l'epargne a long terme

L'INDEXATION AUTOMATIQUE

        explainer: `Le système de retraite tchèque : un pilier unique en pleine réforme

La République tchèque est un cas d'école de la transition post-communiste. Après la chute du rideau de fer en 1989, le pays a hérité d'un système de retraite 100 % public qui s'est progressivement modernisé, mais qui reste encore largement dominé par le premier pilier étatique. Pour comprendre le système tchèque, imaginez une maison avec un très grand rez-de-chaussée (la pension d'État), un petit balcon ajouté récemment (le DPS, l'épargne complémentaire avec aide d'État), et un grenier rarement utilisé (l'épargne individuelle libre).

La grande actualité de 2025, c'est la réforme paramétrique adoptée par le gouvernement Fiala. Jusqu'en 2024, l'âge de départ à la retraite variait selon l'année de naissance et le sexe, avec une convergence progressive vers 65 ans. La réforme de 2025 accélère ce mouvement : pour les personnes nées à partir de 1988, l'âge de départ sera de 67 ans. L'objectif est de maintenir un ratio de 1:1 entre la durée de vie active et la durée de retraite (en moyenne 22 ans de retraite pour 45 ans de cotisation).

        explainer: `Le système russe : tout employeur, rien salarié — et les sanctions UE qui changent la donne

Le tarif unifié de cotisations sociales employeur est de 30 % du salaire brut, décomposé en :

L'âge de la retraite est en pleine transition depuis la réforme controversée de 2019 : il passe progressivement de 60 à 65 ans pour les hommes et de 55 à 60 ans pour les femmes. La transition s'achèvera en 2028. Fait remarquable : 2025 est une « année blanche » — aucune nouvelle classe d'âge n'atteint l'âge de la retraite cette année, en raison de la mécanique de transition par paliers de six mois.

## 1. LE PEPP (Pan-European Personal Pension Product) -- Reglement UE 2019/1238

### 1.1 Qu'est-ce que le PEPP ?

Le PEPP est un produit d'epargne-retraite individuel volontaire, cree par le [Reglement (UE) 2019/1238](https://eur-lex.europa.eu/EN/legal-content/summary/pan-european-personal-pension-product.html), applicable depuis le 22 mars 2022. Il vise a offrir aux citoyens europeens une option supplementaire d'epargne-retraite portable a travers l'UE.

Caracteristiques cles :
- Produit de retraite personnelle du "3e pilier" (pas un regime d'entreprise a proprement parler)
- Peut etre propose par des assureurs, des gestionnaires d'actifs, des banques, certaines entreprises d'investissement et certains fonds de pension professionnels
- Systeme de sous-comptes nationaux : le fournisseur doit ouvrir un "sous-compte" dans chaque pays ou le salarie reside, adapte aux exigences fiscales locales
- Plafond de frais du PEPP de base : 1% des cotisations annuelles (tres conteste)
- Portabilite : un salarie qui change de pays peut continuer a cotiser dans le meme produit, via un changement de sous-compte

### 1.2 Statut actuel : Echec commercial quasi-total

**Le PEPP est un echec a ce stade.** En mars 2026, apres 4 ans d'existence :

  - **LifeGoals** : actif uniquement a Chypre.

- **Aucun fournisseur actif dans les pays de TiMOTION** (France, Allemagne, Italie, Espagne, UK, Pays-Bas, Pologne excepte via Finax, Danemark, Belgique, Republique tcheque via Finax, Russie).

### 1.3 Reforme en cours (Novembre 2025)

La Commission europeenne a publie le 20 novembre 2025 une [proposition de revision majeure](https://www.regulatory-compliance.eu/2025/12/02/eu-review-of-the-regulation-on-a-pan-european-personal-pension-product-pepp/) (dossier 2025/0363(COD)) :

## 2. POOLING MULTINATIONAL & REGIMES DE GROUPE INTERNATIONAUX

### 2.1 Qu'est-ce que le pooling multinational ?

Le [pooling multinational](https://www.multinationalpooling.eu/) est un mecanisme permettant a une entreprise multinationale de consolider les contrats d'assurance de prevoyance/retraite de ses filiales dans differents pays au sein d'un compte unique (le "pool"). L'ensemble est "experience rate" : si les sinistres globaux sont inferieurs aux primes, l'excedent est restitue a l'entreprise sous forme de **dividende**.

**Fonctionnement concret :**
1. Chaque filiale locale maintient ses contrats d'assurance locaux (vie, invalidite, sante, retraite) avec des assureurs locaux -- rien ne change pour les salaries
2. Via un mecanisme de **reassurance**, ces contrats sont consolides dans un pool central
3. Chaque annee, un bilan global est realise : primes encaissees - sinistres - reserves - frais - commissions - taxes = resultat
4. Si le resultat est positif, un **dividende de 8% a 15% des primes** est verse a l'entreprise
5. Si le resultat est negatif, le deficit est reporte ou couvert par un stop-loss

## 4. PARCOURS D'IMPLEMENTATION CONCRET POUR TiMOTION

### 4.1 Etape 1 : Audit et diagnostic (Mois 1-3)

**Actions :**
- Cartographier les regimes existants dans les 11 pays : retraite obligatoire (pilier 1), retraite complementaire (pilier 2), prevoyance (vie, invalidite, sante)
- Identifier les obligations legales par pays
- Evaluer les primes actuelles et la sinistralite
- Comprendre les attentes du groupe TiMOTION (harmonisation ? attraction/retention ? optimisation fiscale ?)

**Livrables :** Rapport de diagnostic multi-pays avec recommandations

**Budget estime :** 15 000 - 30 000 EUR (via un courtier mid-market)

### 4.2 Etape 2 : Choix de la strategie (Mois 3-4)

**Options strategiques pour TiMOTION :**

| Option | Description | Complexite | Cout | Delai |
|--------|-----------|-----------|------|-------|
| **A. Pooling multinational** | Regrouper les contrats existants dans un pool (GEB, IGP, Insurope) | Faible | Nul (economies) | 6-12 mois |
| **B. Harmonisation des regimes** | Mettre en place un niveau minimum de retraite surcomplementaire dans chaque pays | Moyenne | Variable par pays | 12-18 mois |
| **C. IORP transfrontalier** | Creer un fonds de pension unique au Luxembourg ou en Belgique | Elevee | 100 000+ EUR | 18-24 mois |
| **D. Captive de reassurance** | Creer une captive (Luxembourg) pour reassurer les risques employes | Elevee | 200 000+ EUR | 18-24 mois |
| **E. Combinaison A+B** | Pooling + harmonisation progressive | Moyenne | Moderee | 12-18 mois |

**Recommandation pour TiMOTION : Option E (Pooling + Harmonisation progressive)**

### 4.3 Etape 3 : Selection du courtier et du reseau de pooling (Mois 4-5)

- Lancer un appel d'offres aupres de 3-4 courtiers (Howden, Lockton, Gallagher, NFP)
- Selectionner un reseau de pooling (Generali GEB recommande pour le seuil bas d'entree)
- Negocier les conditions

### 4.4 Etape 4 : Mise en pool des contrats existants (Mois 5-12)

**Demarrage par les pays a fort effectif :**

3. **Espagne (5)** : idem

### 4.5 Etape 5 : Mise en place de la retraite surcomplementaire (Mois 6-18)

**Pays par pays :**

| Pays | Vehicule recommande | Specificites |
|------|-------------------|-------------|
| **France** | PER Entreprise Obligatoire (PERO, [ex-Article 83](https://www.ag2rlamondiale.fr/retraite/epargner-pour-sa-retraite/conseil-qu-est-ce-qu-un-contrat-de-retraite-article-83)) | Cotisations deductibles (8% du brut dans la limite de 8 PASS). Exoneration de charges dans certaines limites. Obligatoire pour la categorie concernee. |
| **Allemagne** | Direktversicherung ou Pensionskasse | Entgeltumwandlung (sacrifice salarial) jusqu'a 302 EUR/mois exonere (2025). Betriebliche Altersversorgung obligatoire si le salarie le demande. |
| **Italie** | Fondo Pensione Complementare (ouvert ou ferme) | Deductibilite jusqu'a 5 164,57 EUR/an. TFR (indemnite de depart) peut etre oriente vers le fonds. |
| **Espagne** | Plan de Pensiones de Empleo | Deductibilite des cotisations employeur jusqu'a 8 500 EUR/an (+ 1 500 salarie). |
| **UK** | Workplace Pension (auto-enrolment) | Minimum 8% (3% employeur + 5% salarie). Annual allowance de 60 000 GBP. |
| **Pays-Bas** | Pensioenregeling (DC) | Systeme tres reglemente. Loi Toekomst Pensioenen (2023) : transition vers DC. |
| **Pologne** | PPK (Pracownicze Plany Kapitalowe) | Auto-inscription. 1,5% employeur + 2% salarie minimum. |
| **Danemark** | Arbejdsmarkedspension | Generalement negocie par convention collective. 12-17% du salaire. |
| **Belgique** | Assurance Groupe / Plan de Pension Complementaire | Regle des 80% (rente totale <= 80% du dernier salaire). |
| **Rep. tcheque** | Doplnkove penzijni sporeni | Contribution de l'Etat possible. Deductibilite jusqu'a 24 000 CZK/an. |
| **Russie** | Non-State Pension Fund (NPF) | Hors UE. Marche different. Risque geopolitique. |

## 5. APPROCHES ALTERNATIVES

### 5.1 Comite d'Entreprise Europeen (European Works Council)

La [nouvelle directive EWC (2025/2450)](https://www.globalworkplaceinsider.com/2025/10/revision-of-the-european-works-council-directive-more-rights-and-obligations-for-ewcs/), adoptee le 27 octobre 2025, s'applique aux entreprises ayant **au moins 1 000 salaries dans l'UE/EEE et au moins 150 salaries dans 2 Etats membres differents**.

**TiMOTION n'atteint PAS le seuil** (environ 100 salaries en Europe). Un CEE n'est donc pas obligatoire. Cependant, si le groupe TiMOTION a plus de 1 000 salaries au niveau mondial avec les effectifs taiwanais et d'autres filiales, la directive pourrait s'appliquer.

Dans tous les cas, le CEE est un organe de **consultation**, pas de negociation. Il ne negocie pas directement les regimes de retraite mais doit etre informe/consulte sur les decisions transnationales affectant les salaries.

### 5.2 IORP transfrontalier (Fonds de pension paneuropeen)

La [directive IORP II](https://pensionseurope.eu/policy-priorities/iorp-ii-directive/) permet theoriquement a un employeur de creer un fonds de pension unique dans un Etat membre (typiquement Belgique ou Luxembourg) desservant des salaries de plusieurs pays.

**Realite en 2025 :**
- Seulement 73 IORP transfrontaliers actifs dans toute l'UE (chiffre en baisse)
- La Belgique est le pays d'origine couvrant le plus de pays hotes (15)
- L'objectif initial de l'IORP I de creer un marche interieur des pensions d'entreprise **reste largement inaccompli**, principalement a cause des differences de fiscalite et de droit social entre pays
- Exemple notable : [Sanofi a cree un fonds de pension europeen](https://www.ipe.com/germany-added-to-sanofi-pension-fund-in-belgium-cross-border-first/10055365.article) en Belgique couvrant l'Irlande, la Suisse et l'Allemagne
- **[IME Pension Fund](https://imepensionfund.com/)** au Luxembourg propose une structure "umbrella fund" regulee pouvant accueillir des plans DC et DB pour des employeurs multiples

**Pour TiMOTION :** Cette approche est **trop lourde et trop couteuse** pour 100 salaries. Les couts de mise en place (100 000+ EUR), les exigences reglementaires et la complexite fiscale la reservent aux grands groupes (1 000+ salaries).

### 5.3 Captive de reassurance

Mecanisme par lequel TiMOTION creerait sa propre societe d'assurance captive (typiquement au [Luxembourg](https://blog.pwc.lu/captives-emerging-and-hard-to-place-risks/) ou a l'Ile de Man) pour reassurer les risques employee benefits de ses filiales.

**Comment ca fonctionne** ([Marsh](https://www.marsh.com/en/services/captive-insurance/insights/captives-multinational-employee-benefit-programs.html), [AXA XL](https://axaxl.com/fast-fast-forward/articles/using-captives-in-multinational-employee-benefits-programs)) :
1. Les assureurs locaux ("fronting carriers") maintiennent les contrats locaux
2. Ils cedent le risque a la captive via un contrat de reassurance
3. La captive conserve les primes, paie les sinistres, et garde les benefices
4. Economies typiques : **25% ou plus** par rapport au modele classique

**Pour TiMOTION :** **Non recommande a ce stade.** La creation d'une captive necessite un volume de primes significatif (generalement > 500 000 EUR/an en employee benefits) et un capital initial important. C'est une solution pour les groupes de 500+ salaries avec des primes substantielles. Cependant, si TiMOTION consolide ses primes mondiales (y compris Taiwan et autres), cela pourrait devenir pertinent a terme. [Allianz propose aussi de la reassurance captive](https://www.allianzcare.com/content/dam/onemarketing/azcare/allianzcare/en/docs/DOC-Captive-Reinsurance-Factsheet-EN.pdf) integree a son reseau de pooling.

### 5.4 Directive IORP II revisee (Novembre 2025)

La [Commission europeenne a propose en novembre 2025](https://commission.europa.eu/news-and-media/news/commission-proposes-boost-supplementary-pensions-and-simplify-rules-sustainable-financial-products-2025-11-20_en) un "paquet pensions supplementaires" incluant :
- Revision de la directive IORP II pour simplifier les fusions transfrontalieres et les transferts de droits
- Recommandation aux Etats d'instaurer l'auto-inscription en retraite supplementaire pour tous les travailleurs
- Obligation pour les fonds de pension de surveiller leur performance par rapport a des benchmarks nationaux
- Actuellement, **seulement 20% des travailleurs UE** participent a un regime professionnel de retraite

**Impact pour TiMOTION :** Ces reformes faciliteront a moyen terme (2028+) la gestion transfrontaliere des pensions mais ne changent rien a court terme.

function mdToHtml(text) {
  if (!text) return '';
  let h = text;

  // Parse markdown tables FIRST
  h = h.replace(/(?:^|\n)((?:\|[^\n]+\|\n)+)/g, function(match, tableBlock) {
    const rows = tableBlock.trim().split('\n').filter(r => r.trim());
    if (rows.length < 2) return match;

    // Check if second row is separator
    const isSep = /^\|[\s\-:|]+\|$/.test(rows[1].trim());
    const startRow = isSep ? 2 : 1;

    let table = '<div style="overflow-x:auto;margin:16px 0;"><table class="data-table"><thead><tr>';
    // Header
    const headers = rows[0].split('|').filter(c => c.trim() !== '');
    headers.forEach(h => { table += `<th>${h.trim()}</th>`; });
    table += '</tr></thead><tbody>';

    // Body rows
    for (let i = startRow; i < rows.length; i++) {
      const cells = rows[i].split('|').filter(c => c.trim() !== '');
      if (cells.length === 0) continue;
      const isLastRow = i === rows.length - 1;
      table += `<tr${isLastRow ? ' style="font-weight:700;background:var(--gradient-subtle);"' : ''}>`;
      cells.forEach(c => {
        let content = c.trim().replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        table += `<td>${content}</td>`;
      });
      table += '</tr>';
    }
    table += '</tbody></table></div>';
    return '\n' + table + '\n';
  });

  // Then rest of markdown parsing
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^### (.+)$/gm, '<h4 style="margin:16px 0 8px;font-size:0.95rem;">$1</h4>')
    .replace(/^## (.+)$/gm, '<h3 style="margin:20px 0 10px;font-size:1.05rem;">$1</h3>')
    .replace(/^# (.+)$/gm, '<h3 style="font-size:1.15rem;margin:24px 0 12px;">$1</h3>')
    .replace(/^--- (.+) ---$/gm, '<h3 style="font-size:1.05rem;margin:24px 0 12px;padding:12px 16px;background:var(--gradient-subtle);border-radius:8px;">$1</h3>')
    .replace(/^[—•] (.+)$/gm, '<li style="margin-bottom:4px;">$1</li>')
    .replace(/^- (.+)$/gm, '<li style="margin-bottom:4px;">$1</li>')
    .replace(/^\* (.+)$/gm, '<li style="margin-bottom:4px;">$1</li>')
    .replace(/^(\d+)\. (.+)$/gm, '<li style="margin-bottom:4px;"><strong>$1.</strong> $2</li>')
    .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank" style="color:var(--primary);">$1</a>')
    .replace(/\n\n/g, '</p><p style="margin-bottom:12px;">')
    .replace(/\n/g, '<br>');

  // Wrap loose <li> in <ul>
  h = h.replace(/(<li[^>]*>.*?<\/li>(\s*<br>)?)+/gs, function(match) {
    return '<ul style="margin:8px 0 12px 20px;list-style:disc;">' + match.replace(/<br>/g, '') + '</ul>';
  });
  h = h.replace(/<\/ul>\s*<ul[^>]*>/g, '');

  return '<p style="margin-bottom:12px;">' + h + '</p>';
}

function formatText(text) {
  if (!text) return '';
  return mdToHtml(text);
}

function toggleAccordion(el) {
  const trigger = el;
  const body = trigger.nextElementSibling;
  const isOpen = trigger.classList.contains('open');
  trigger.classList.toggle('open');
  body.classList.toggle('open');
}

function switchPillar(el, idx) {
  const container = el.closest('.pillar-container');
  container.querySelectorAll('.pillar-tab').forEach(t => t.classList.remove('active'));
  container.querySelectorAll('.pillar-panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  container.querySelectorAll('.pillar-panel')[idx].classList.add('active');
}

  document.getElementById('tab-salaire').innerHTML = html;
}

function initStrategieBudgetChart() {
  destroyChart('chartBudget');
  const ctx = document.getElementById('chartBudget');
  if (!ctx) return;
  const countries = ['FR','DE','IT','ES','UK','NL','PL','DK','BE','CZ','RU'];
  const hc = countries.map(c => CHART_DATA.headcounts[c]);
  const totalHC = hc.reduce((a,b) => a+b, 0);
  const annualBudget = 130000;
  const budgetPerCountry = hc.map(h => Math.round(annualBudget * h / totalHC));
  const names = countries.map(c => DATA[c].flag + ' ' + DATA[c].name);
  const colors = ['#e8842c','#1e2d3d','#F5A623','#3E5C8A','#c06a1e','#2d8a5e','#5a6c7d','#3d7ab5','#dc2626','#16a34a','#7c3aed'];
  chartInstances['chartBudget'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: names,
      datasets: [{
        label: 'Budget primes annuel estimé (€)',
        data: budgetPerCountry,
        backgroundColor: colors,
        borderRadius: 6,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(ctx.parsed.y) } },

      scales: {
        y: { ticks: { callback: v => (v/1000) + 'k €' }, grid: { color: 'rgba(0,0,0,0.05)' } },
        x: { grid: { display: false }, ticks: { maxRotation: 45, minRotation: 30, font: { size: 11 } } },
      }
    }
  });
}

// TAB SWITCHING
// =============================================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.content-area').forEach(c => c.classList.remove('visible'));
  document.getElementById('tab-' + tab).classList.add('visible');
  renderCountrySelector();
  renderCurrentTab();
}

function renderCurrentTab() {
  switch(currentTab) {
    case 'retraite': renderRetraite(); break;
    case 'salaire': renderSalaire(); break;
    case 'comparatif': renderComparatif(); break;
    case 'strategie': renderStrategie(); break;
  }
}

function selectCountry(code) {
  currentCountry = code;
  renderNavPills();
  renderCountrySelector();
  if (currentTab === 'retraite' || currentTab === 'salaire') {
    renderCurrentTab();
  }
}

// =============================================
// INIT
// =============================================
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => switchTab(t.dataset.tab));
});
